<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra of Convex Curves</title>
    <script src="HuhShape.js"></script>
    <script src="guiEngine.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --bg-elev: #161b22;
            --bg-canvas: #0a0d13;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --accent: #7aa2f7;
            --accent-glow: rgba(122, 162, 247, 0.18);
            --border: #30363d;
            --danger: #f87171;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding: 28px 16px 48px;
            min-height: 100vh;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            font-style: italic;
            text-align: center;
            margin: 8px 0 32px;
            letter-spacing: 0.3px;
            background: linear-gradient(90deg, #7aa2f7, #c678dd, #f87171);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 24px;
            max-width: 1220px;
            margin: 0 auto;
        }

        .col {
            flex: 1 1 320px;
            max-width: 380px;
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        canvas {
            width: 100%;
            max-width: 340px;
            height: auto;
            aspect-ratio: 1 / 1;
            background: var(--bg-canvas);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 0 30px var(--accent-glow), inset 0 0 24px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .col > p {
            width: 100%;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 16px 0 10px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
        }

        ul li {
            display: grid;
            grid-template-columns: 112px 1fr 44px;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
        }

        label {
            font-size: 13px;
            color: var(--text-dim);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 999px;
            outline: none;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-glow);
            transition: transform 0.12s ease;
        }

        input[type=range]::-webkit-slider-thumb:hover,
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.18);
        }

        input[type=range]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        input[type=range]:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
            border-radius: 2px;
        }

        .val {
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            color: var(--accent);
            text-align: right;
            margin: 0;
            min-width: 0;
        }

        @media (max-width: 720px) {
            body { padding: 18px 12px 32px; }
            .title { font-size: 22px; margin-bottom: 20px; }
            .grid { gap: 16px; }
            .col {
                padding: 16px;
                flex: 1 1 100%;
                max-width: 100%;
                width: 100%;
            }
            ul li {
                grid-template-columns: 104px 1fr 46px;
                padding: 10px 0;
            }
            input[type=range] { height: 6px; }
            input[type=range]::-webkit-slider-thumb { width: 24px; height: 24px; }
            input[type=range]::-moz-range-thumb { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>
    <h1 class="title">Algebra of Convex Curves</h1>
    <div class="grid">
        <div id="col1" class="col"></div>
        <div id="col2" class="col"></div>
        <div id="col3" class="col"></div>
    </div>
</body>
</html>
